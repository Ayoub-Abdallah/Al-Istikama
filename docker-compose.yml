version: '3.8'
services:
  moodle_db:
    image: mysql:8.4
    container_name: istikama-moodle_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodleuser
      MYSQL_PASSWORD: moodlepass
    volumes:
      - db_data:/var/lib/mysql

  moodle_app:
    image: moodlehq/moodle-php-apache:8.2
    container_name: istikama-moodle_app
    ports:
      - "8080:80"
    environment:
      MOODLE_DATABASE_TYPE: mysqli
      MOODLE_DATABASE_HOST: moodle_db
      MOODLE_DATABASE_NAME: moodle
      MOODLE_DATABASE_USER: moodleuser
      MOODLE_DATABASE_PASSWORD: moodlepass
      APACHE_DOCUMENT_ROOT: /var/www/html/public
    depends_on:
      - moodle_db
    volumes:
      - ./moodle-docker/moodle:/var/www/html
      - ./moodle-docker/moodledata:/var/www/moodledata

volumes:
  db_data:
